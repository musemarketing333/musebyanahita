<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Now | Muse by Anahita</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: white; margin: 0; overflow-x: hidden; }
        .font-serif { font-family: 'Playfair Display', serif; }

        /* HERO VIDEO STYLING */
        .hero-video-container {
            position: relative;
            width: 100%;
            height: 80vh; /* Takes up 80% of screen height */
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-video-container iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 56.25vw; /* 16:9 Aspect Ratio */
            min-height: 80vh;
            min-width: 142.22vh; /* Ensures video covers screen */
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1;
        }

        /* Dark overlay to make text readable */
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(10,10,10,0.3) 0%, rgba(10,10,10,1) 100%);
            z-index: 2;
        }

        .hero-content {
            position: relative;
            z-index: 3;
            text-align: center;
            padding: 0 20px;
        }

        /* ANIMATED GRADIENT BACKGROUND */
        .gradient-bg {
            position: relative;
            background: #0a0a0a;
            padding-bottom: 100px;
        }

        .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(76,29,149,0.3) 0%, rgba(0,0,0,0) 70%);
            filter: blur(80px);
            z-index: 0;
            animation: drift 15s infinite alternate ease-in-out;
        }

        @keyframes drift {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }

        .calendly-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }
    </style>
</head>
<body>

    <!-- NAV / LOGO -->
    <nav class="absolute top-0 w-full z-50 py-10 flex justify-center">
        <div class="text-center">
            <h1 class="text-3xl md:text-4xl font-serif tracking-[0.3em] uppercase text-white">Muse</h1>
            <span class="block text-[10px] tracking-[0.5em] font-sans uppercase text-stone-500 mt-1">By Anahita</span>
        </div>
    </nav>

    <!-- VIDEO HERO -->
    <section class="hero-video-container">
        <!-- Optimized YouTube Embed for Background -->
        <iframe 
            src="https://www.youtube.com/embed/8XhS102O0YI?autoplay=1&mute=1&controls=0&loop=1&playlist=8XhS102O0YI&rel=0&modestbranding=1" 
            frameborder="0" 
            allow="autoplay; encrypted-media">
        </iframe>
        <div class="video-overlay"></div>
        
        <div class="hero-content mt-20">
            <h2 class="text-3xl md:text-6xl font-serif italic mb-6">Redefine Your Beauty</h2>
            <p class="text-stone-300 text-[10px] md:text-xs tracking-[0.3em] uppercase max-w-xl mx-auto leading-loose">
                Select the date, time & service of your choice to book your session with our specialists.
            </p>
        </div>
    </section>

    <!-- CALENDLY SECTION -->
    <section class="gradient-bg px-4 -mt-10">
        <div class="glow" style="top: 10%; left: -10%;"></div>
        <div class="glow" style="bottom: 10%; right: -10%; background: radial-gradient(circle, rgba(131,24,67,0.2) 0%, rgba(0,0,0,0) 70%);"></div>

        <div class="max-w-5xl mx-auto calendly-card shadow-2xl overflow-hidden">
            <!-- CALENDLY WIDGET -->
            <div class="calendly-inline-widget" 
                 data-url="https://calendly.com/musemarketing333/muse-by-anahita?hide_event_type_details=1&hide_gdpr_banner=1&background_color=0a0a0a&text_color=ffffff&primary_color=ffffff" 
                 style="min-width:320px; height:800px;">
            </div>
            <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="bg-[#0a0a0a] py-24 px-6 text-center border-t border-white/5">
        <div class="max-w-3xl mx-auto">
            <h3 class="font-serif text-3xl mb-10 tracking-widest uppercase">Visit the Studio</h3>
            
            <div class="space-y-4 mb-12">
                <p class="text-stone-400 text-sm uppercase tracking-widest">Phase 6, DHA, Karachi, Pakistan</p>
                <p class="text-stone-500 text-sm italic underline underline-offset-8">@muse_by_anahita</p>
            </div>
            
            <div class="flex flex-col md:flex-row justify-center items-center gap-8">
                <a href="https://wa.me/923314666585" target="_blank" class="border border-white/20 px-8 py-3 text-[10px] tracking-[0.3em] uppercase hover:bg-white hover:text-black transition duration-500">
                    WhatsApp: +92 331 4666585
                </a>
                <a href="https://instagram.com/muse_by_anahita" target="_blank" class="text-[10px] tracking-[0.3em] uppercase text-stone-400 hover:text-white transition">
                    Instagram
                </a>
            </div>
            
            <div class="mt-20 text-[9px] text-stone-700 uppercase tracking-[0.5em]">
                &copy; 2025 Muse By Anahita. Luxury Studio.
            </div>
        </div>
    </footer>

</body>
</html>
