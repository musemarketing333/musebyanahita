<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Muse by Anahita | Luxury Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0a0a0a; 
            color: white; 
            margin: 0; 
            padding: 0;
            overflow-x: hidden; 
            width: 100%;
        }
        .font-serif { font-family: 'Playfair Display', serif; }

        /* FIXED VIDEO CONTAINER */
        .hero-container {
            position: relative;
            width: 100%;
            height: 75vh;
            background: #000;
            overflow: hidden; /* This hides the controls that we push outside the bounds */
        }

        .video-foreground {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* 
           The "Oversize Hack": 
           We make the iframe 20% larger than its container and center it.
           This pushes the YouTube top bar and bottom controls outside the visible area.
        */
        .video-foreground iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 130vw; /* Wider than screen */
            height: 130vh; /* Higher than container */
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        /* Responsive scaling for different screen shapes */
        @media (max-aspect-ratio: 16/9) {
            .video-foreground iframe {
                width: 250vh; 
            }
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(10,10,10,0.2) 0%, rgba(10,10,10,1) 100%);
            z-index: 2;
        }

        /* ANIMATED GLOW */
        .glow-bg {
            position: relative;
            padding: 40px 10px;
            background: #0a0a0a;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(76,29,149,0.1) 0%, rgba(0,0,0,0) 70%);
            filter: blur(60px);
            z-index: 1;
            animation: move 15s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }

        /* CALENDLY RESPONSIVENESS */
        .calendly-wrapper {
            position: relative;
            z-index: 10;
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            overflow: hidden;
            width: 100%;
            max-width: 1024px;
            margin: 0 auto;
        }

        /* Adjustments to handle mobile text without overflow */
        .mobile-tracking { letter-spacing: 0.15em; }
        @media (min-width: 768px) {
            .mobile-tracking { letter-spacing: 0.5em; }
        }
    </style>
</head>
<body>

    <!-- NAV -->
    <nav class="absolute top-0 w-full z-50 py-10 text-center">
        <h1 class="text-2xl md:text-4xl font-serif tracking-[0.2em] md:tracking-[0.3em] uppercase">Muse</h1>
        <span class="block text-[9px] md:text-[10px] tracking-[0.4em] md:tracking-[0.5em] font-sans uppercase text-stone-500 mt-1">By Anahita</span>
    </nav>

    <!-- VIDEO HERO -->
    <section class="hero-container">
        <div class="video-foreground">
            <!-- 
                modestbranding=1, controls=0, autohide=1, showinfo=0 
                All parameters aimed at reducing UI flicker. 
                The CSS "Oversize Hack" does the rest of the work.
            -->
            <iframe 
                src="https://www.youtube.com/embed/xiv5PBwG3OU?autoplay=1&mute=1&loop=1&playlist=xiv5PBwG3OU&controls=0&disablekb=1&modestbranding=1&rel=0&showinfo=0&iv_load_policy=3&enablejsapi=1&playsinline=1" 
                frameborder="0" 
                allow="autoplay; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>
        <div class="video-overlay"></div>
        
        <div class="relative z-10 flex flex-col items-center justify-end h-full pb-16 md:pb-20 px-6 text-center">
            <h2 class="text-4xl md:text-6xl font-serif italic mb-4">Redefine Your Beauty</h2>
            <p class="text-stone-300 text-[10px] md:text-xs tracking-[0.2em] md:tracking-[0.4em] uppercase max-w-[300px] md:max-w-xl leading-relaxed">
                Select the date, time & service of your choice to book your session with our specialists.
            </p>
        </div>
    </section>

    <!-- CALENDLY SECTION -->
    <section class="glow-bg">
        <div class="blob" style="top: 0; left: 0;"></div>
        <div class="blob" style="bottom: 0; right: 0; background: radial-gradient(circle, rgba(131,24,67,0.1) 0%, rgba(0,0,0,0) 70%);"></div>

        <div class="calendly-wrapper shadow-2xl">
            <!-- Increased height to 900px for mobile to ensure no internal cut-off -->
            <div class="calendly-inline-widget" 
                 data-url="https://calendly.com/musemarketing333/muse-by-anahita?hide_event_type_details=1&hide_gdpr_banner=1&background_color=0a0a0a&text_color=ffffff&primary_color=ffffff" 
                 style="min-width:320px; height:900px; width:100%;">
            </div>
            <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="py-16 md:py-24 px-6 text-center border-t border-white/5">
        <div class="max-w-3xl mx-auto">
            <h3 class="font-serif text-3xl mb-10 md:mb-12 tracking-widest uppercase">Visit the Studio</h3>
            
            <div class="space-y-6 mb-12">
                <!-- Tighter tracking for mobile to prevent screen-edge overflow -->
                <p class="text-stone-400 text-[10px] md:text-sm uppercase mobile-tracking">Phase 6, DHA, Karachi, Pakistan</p>
                <a href="https://instagram.com/muse_by_anahita" target="_blank" class="block text-stone-300 text-sm italic hover:text-white transition">@muse_by_anahita</a>
            </div>
            
            <div class="flex flex-col md:flex-row justify-center items-center gap-6">
                <a href="https://wa.me/923314666585" target="_blank" class="w-full md:w-auto border border-white/20 px-10 py-4 text-[10px] tracking-[0.3em] uppercase hover:bg-white hover:text-black transition duration-500">
                    WhatsApp: +92 331 4666585
                </a>
            </div>
            
            <div class="mt-20 text-[9px] text-stone-700 uppercase tracking-[0.3em] md:tracking-[0.5em]">
                &copy; 2025 Muse By Anahita. All Rights Reserved.
            </div>
        </div>
    </footer>

</body>
</html>
